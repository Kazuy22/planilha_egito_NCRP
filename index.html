<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planilha EGITO_NCRP</title>
    
    <!-- Toastify CSS -->
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net">
    
    <!-- Bibliotecas JS (Links Completos e Estáveis) -->
    <script src="https://cdn.jsdelivr.net"></script>
    <script src="https://cdn.jsdelivr.net"></script>
    
    <!-- SDK FIREBASE COMPAT (Links Completos - Essencial para funcionar) -->
    <script src="https://www.gstatic.com"></script>
    <script src="https://www.gstatic.com"></script>

    <style>
        :root {
            --primary: #1a1a1a; --accent: #f39c12; --danger: #c0392b;
            --success: #27ae60; --info: #2980b9; --dark: #121212;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.8)), url('https://cdn.discordapp.com');
            background-size: cover; background-position: center; background-attachment: fixed;
            margin: 0; color: white; overflow-x: hidden; 
        }
        
        #loader {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 9999; justify-content: center; align-items: center; flex-direction: column;
        }
        .spinner {
            width: 50px; height: 50px; border: 5px solid #333; border-top: 5px solid var(--accent);
            border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 10px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .login-box { background: rgba(30, 30, 30, 0.9); padding: 30px; border-radius: 12px; width: 350px; text-align: center; border: 1px solid #444; backdrop-filter: blur(5px); }
        input, select { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #333; background: #2b2b2b; color: white; margin-bottom: 10px; box-sizing: border-box; outline: none; }
        .role-option { background: #333; padding: 10px; border-radius: 6px; cursor: pointer; margin-bottom: 5px; border: 1px solid transparent; transition: 0.3s; }
        .role-option.active { border-color: var(--accent); background: #3d2e10; color: var(--accent); font-weight: bold; }

        #dashboard { display: none; padding: 20px; animation: fadeIn 0.5s; }
        header { display: flex; justify-content: space-between; align-items: center; background: rgba(30, 30, 30, 0.9); padding: 15px 25px; border-radius: 10px; margin-bottom: 20px; border-bottom: 2px solid var(--accent); }
        
        .table-container { background: rgba(30, 30, 30, 0.85); padding: 20px; border-radius: 10px; overflow-x: auto; backdrop-filter: blur(5px); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #444; padding: 12px; text-align: center; font-size: 13px; font-weight: bold; }
        th { background: rgba(37, 37, 37, 0.9); color: var(--accent); text-transform: uppercase; }

        .btn-action { color: white; border: none; padding: 10px 18px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-right: 5px; margin-bottom: 5px; transition: 0.3s; display: inline-flex; align-items: center; gap: 5px; }
        .btn-green { background: var(--success); } .btn-blue { background: var(--info); }
        .btn-yellow { background: var(--accent); color: #000; } .btn-red { background: var(--danger); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="loader"><div class="spinner"></div><span id="loader-text">Processando...</span></div>

    <!-- LOGIN -->
    <div id="login-screen">
        <div class="login-box">
            <h2 style="color:var(--accent); margin-top: 0;">FAMÍLIA GESTÃO</h2>
            <input type="text" id="user-nick" placeholder="Seu Nick">
            <div id="role-selector" style="margin: 15px 0;">
                <div class="role-option" onclick="selectRole(this, 'Responsável')">Responsável</div>
                <div class="role-option" onclick="selectRole(this, 'Auxiliar')">Auxiliar</div>
            </div>
            <button class="btn-action btn-yellow" style="width:100%; justify-content: center; padding: 15px;" onclick="login()">Entrar no Sistema</button>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard">
        <header>
            <div id="welcome-msg" style="font-size: 18px;">Painel</div>
            <button class="btn-action btn-red" onclick="location.reload()">Sair</button>
        </header>

        <div class="table-container">
            <div style="margin-bottom:20px;">
                <button class="btn-action btn-green" onclick="addRow()">➕ Novo Membro</button>
                <button class="btn-action btn-blue" onclick="refreshAndSync()">🔄 Salvar Alterações</button>
                <button class="btn-action btn-yellow" onclick="organizeTable()">⚡ Organizar</button>
                <button class="btn-action btn-red" onclick="clearTable()">🗑️ Limpar Tudo</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Cor</th><th>Nick</th><th>ID Cidade</th><th>Cargo</th><th>Ações</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyCk_NI_zL76u4X7kV7QH6T-XDMBugE2VUQ",
    authDomain: "egito-planilhas.firebaseapp.com",
    databaseURL: "https://egito-planilhas-default-rtdb.firebaseio.com",
    projectId: "egito-planilhas",
    storageBucket: "egito-planilhas.firebasestorage.app",
    messagingSenderId: "612959808834",
    appId: "1:612959808834:web:3066294a4b4258786cecdb"
};

if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}
const db = firebase.database();
let currentRole = "";

function selectRole(el, role) {
    document.querySelectorAll('.role-option').forEach(opt => opt.classList.remove('active'));
    el.classList.add('active');
    currentRole = role;
}

function login() {
    const nick = document.getElementById('user-nick').value;
    if (!nick || !currentRole) return alert("Preencha o Nick e selecione o Cargo!");
    
    document.getElementById('loader').style.display = 'flex';
    setTimeout(() => {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        document.getElementById('loader').style.display = 'none';
        document.getElementById('welcome-msg').innerText = `Bem-vindo, ${nick} (${currentRole})`;
        loadData();
    }, 1000);
}

function addRow(data = {color: '#f39c12', nick: '', id: '', role: 'Membro'}) {
    const tbody = document.getElementById('table-body');
    const tr = document.createElement('tr');
    tr.innerHTML = `
        <td><input type="color" value="${data.color}" style="width:45px; border:none; background:none; cursor:pointer;"></td>
        <td><input type="text" value="${data.nick}" placeholder="Nick" style="margin:0"></td>
        <td><input type="number" value="${data.id}" placeholder="ID" style="margin:0"></td>
        <td>
            <select>
                <option value="Membro" ${data.role === 'Membro' ? 'selected' : ''}>Membro</option>
                <option value="Líder" ${data.role === 'Líder' ? 'selected' : ''}>Líder</option>
                <option value="Sub-Líder" ${data.role === 'Sub-Líder' ? 'selected' : ''}>Sub-Líder</option>
            </select>
        </td>
        <td><button class="btn-action btn-red" onclick="this.parentElement.parentElement.remove()">🗑️</button></td>
    `;
    tbody.appendChild(tr);
}

function refreshAndSync() {
    const rows = document.querySelectorAll('#table-body tr');
    const membros = [];
    rows.forEach(row => {
        const inputs = row.querySelectorAll('input');
        const select = row.querySelector('select');
        membros.push({
            color: inputs[0].value,
            nick: inputs[1].value,
            id: inputs[2].value,
            role: select.value
        });
    });

    db.ref('membros').set(membros).then(() => {
        Toastify({ text: "Sincronizado na Nuvem!", duration: 2000, style: { background: "#27ae60" } }).showToast();
    });
}

function loadData() {
    db.ref('membros').on('value', (snapshot) => {
        const data = snapshot.val();
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = '';
        if (data) {
            const lista = Array.isArray(data) ? data : Object.values(data);
            lista.forEach(m => addRow(m));
        }
    });
}

function organizeTable() {
    const tbody = document.getElementById('table-body');
    const rows = Array.from(tbody.querySelectorAll('tr'));
    rows.sort((a, b) => {
        const nickA = a.querySelectorAll('input')[1].value.toUpperCase();
        const nickB = b.querySelectorAll('input')[1].value.toUpperCase();
        return nickA.localeCompare(nickB);
    });
    rows.forEach(row => tbody.appendChild(row));
}

function clearTable() {
    if(confirm("Apagar todos os dados da nuvem?")) {
        db.ref('membros').remove();
    }
}
</script>
</body>
</html>
